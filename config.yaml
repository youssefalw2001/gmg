llm:
  provider: ollama
  model: qwen2.5-coder:32b
  base_url: http://localhost:11434
  temperature: 0.2
  max_tokens: 4096

groq:
  enabled: true
  model: mistral-large
  api_key_env: ANTHROPIC_API_KEY

anthropic:
  enabled: false
  model: claude-fable-5
  api_key_env: ANTHROPIC_API_KEY
  base_url: https://router.bynara.id/v1

embeddings:
  provider: ollama
  model: nomic-embed-text
  dimensions: 768

memory:
  db_path: ./data/agent.db
  episodic_ttl_days: 30

target:
  name: "gmgn.ai"
  base_url: "https://gmgn.ai"
  auth_type: "bearer"
  actors:
    - id: "user_a"
      token_env: "USER_A_TOKEN"
      tenant_id: "d7fd12f7-680f-4a32-9c69-70fcde545d7a"
    - id: "user_b"  
      token_env: "USER_B_TOKEN"
      tenant_id: "d7fd12f7-680f-4a32-9c69-70fcde545d7a"

safety:
  rate_limit_rps: 5
  max_requests_per_task: 300
  max_loop_iterations: 40
  passive_only: true
  allow_hosts:
    - "gmgn.ai"

logging:
  level: INFO
  json: true
  path: ./data/agent.log
